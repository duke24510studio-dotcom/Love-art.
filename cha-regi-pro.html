<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>茶レジ Pro</title>
  <style>
    :root{
      --bg:#f5f0e7;
      --card:#ffffff;
      --ink:#1c1917;
      --muted:#78716c;
      --line:#e7e5e4;
      --green:#064e3b;
      --green2:#022c22;
      --danger:#dc2626;
      --soft:#f7f3ea;
      --accent:#d97706;
      --shadow:0 10px 30px rgba(28,25,23,.08);
      --radius:22px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
      background:var(--bg);
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
    }
    header{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(245,240,231,.97);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line);
      padding:10px 14px 0;
    }
    .header-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .brand small{
      display:block;
      color:var(--green);
      font-size:11px;
      letter-spacing:.22em;
      font-weight:800;
      text-transform:uppercase;
    }
    .brand h1{margin:0;font-size:22px;letter-spacing:-.04em}
    .tabs{
      display:flex;
      gap:4px;
    }
    .tab{
      padding:9px 18px;
      border:0;
      border-radius:14px 14px 0 0;
      background:transparent;
      color:var(--muted);
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      transition:all .15s;
    }
    .tab.active{
      background:var(--green);
      color:white;
    }
    button,input,textarea,select{font:inherit}
    button{
      border:0;
      border-radius:16px;
      padding:11px 14px;
      font-weight:800;
      cursor:pointer;
      touch-action:manipulation;
      transition:background .12s,opacity .12s;
    }
    button:disabled{opacity:.4}
    .btn-primary{background:var(--green);color:white}
    .btn-primary:active{background:var(--green2)}
    .btn-accent{background:var(--accent);color:white}
    .btn-light{background:white;color:var(--ink);border:1px solid var(--line)}
    .btn-danger{background:white;color:var(--danger);border:1px solid #fecaca}
    .btn-ghost{background:transparent;color:var(--muted);padding:8px 10px}
    .wrap{
      width:min(1180px,100%);
      margin:0 auto;
      padding:14px;
      display:grid;
      grid-template-columns:1fr 380px;
      gap:14px;
    }
    .panel{display:none}
    .panel.active{display:block}

    /* Stats */
    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-bottom:14px;
    }
    .stat{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
    }
    .stat span{display:block;color:var(--muted);font-size:12px}
    .stat strong{font-size:24px;letter-spacing:-.04em}

    /* Search */
    .search{position:relative;margin-bottom:14px}
    .search input{
      width:100%;
      border:1px solid var(--line);
      border-radius:999px;
      padding:13px 16px;
      background:white;
      outline:none;
      box-shadow:var(--shadow);
    }

    /* Product grid */
    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }
    .product{
      overflow:hidden;
      background:white;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:transform .1s;
    }
    .product:active{transform:scale(.97)}
    .photo{
      aspect-ratio:4/3;
      background:#eee7dc;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      color:#a8a29e;
      font-weight:800;
      font-size:13px;
    }
    .photo img{width:100%;height:100%;object-fit:cover}
    .product-body{padding:12px 12px 4px}
    .product h2{margin:0 0 3px;font-size:15px;line-height:1.25}
    .meta{color:var(--muted);font-size:12px;line-height:1.35}
    .price{margin-top:6px;color:var(--green);font-size:22px;font-weight:900;letter-spacing:-.05em}
    .product-actions{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:6px;
      padding:6px 10px 10px;
    }

    /* Scan panel */
    .scan-wrap{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .camera-box{
      position:relative;
      background:#1c1917;
      border-radius:var(--radius);
      overflow:hidden;
      aspect-ratio:4/3;
      max-height:60vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #scanVideo{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .scan-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }
    .scan-frame{
      width:220px;
      height:220px;
      border:3px solid rgba(255,255,255,.7);
      border-radius:20px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.35);
    }
    .scan-hint{
      position:absolute;
      bottom:14px;
      left:0;right:0;
      text-align:center;
      color:white;
      font-size:13px;
      font-weight:700;
      text-shadow:0 1px 4px rgba(0,0,0,.6);
    }
    .scan-detected{
      position:absolute;
      top:14px;
      left:14px;right:14px;
      background:rgba(6,78,59,.92);
      color:white;
      border-radius:14px;
      padding:10px 14px;
      font-size:14px;
      font-weight:700;
      display:none;
    }
    .scan-controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .scan-result-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .scan-match{
      background:white;
      border-radius:18px;
      padding:13px;
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      gap:12px;
      cursor:pointer;
      transition:transform .1s;
    }
    .scan-match:active{transform:scale(.97)}
    .scan-match-photo{
      width:60px;height:60px;
      border-radius:12px;
      background:#eee7dc;
      overflow:hidden;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#a8a29e;
      font-size:11px;
      font-weight:700;
    }
    .scan-match-photo img{width:100%;height:100%;object-fit:cover}
    .scan-match-info{flex:1;min-width:0}
    .scan-match-info h3{margin:0 0 2px;font-size:16px}
    .scan-match-add{
      background:var(--green);
      color:white;
      border-radius:12px;
      padding:10px 14px;
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
    }

    /* Report panel */
    .report-wrap{display:flex;flex-direction:column;gap:14px}
    .report-header{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .report-header h2{margin:0;font-size:20px;flex:1}
    .date-range{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .date-range label{font-size:13px;font-weight:700;color:var(--muted)}
    .date-range input[type=date]{
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 10px;
      background:white;
      font-size:13px;
      outline:none;
    }
    .report-summary{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }
    .report-card{
      background:white;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }
    .report-card span{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
    .report-card strong{font-size:28px;letter-spacing:-.04em}
    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    thead{background:var(--green);color:white}
    th{padding:12px 14px;font-size:13px;text-align:left;font-weight:800}
    td{padding:11px 14px;font-size:14px;border-top:1px solid var(--line)}
    tr:hover td{background:var(--soft)}
    .rank{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:26px;height:26px;
      border-radius:999px;
      background:var(--line);
      font-size:12px;
      font-weight:900;
    }
    .rank.gold{background:#fbbf24;color:white}
    .rank.silver{background:#9ca3af;color:white}
    .rank.bronze{background:#d97706;color:white}
    .sort-btn{
      background:transparent;
      border:0;
      cursor:pointer;
      color:white;
      font:inherit;
      font-weight:800;
      font-size:13px;
      padding:0;
      display:flex;
      align-items:center;
      gap:4px;
    }
    .bar-wrap{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .bar{
      height:8px;
      border-radius:999px;
      background:var(--green);
      min-width:4px;
    }

    /* Cart */
    .cart{
      position:sticky;
      top:90px;
      max-height:calc(100vh - 104px);
      display:flex;
      flex-direction:column;
      background:white;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
    }
    .cart-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:10px;
    }
    .cart-head h2{margin:0;font-size:20px}
    .cart-list{
      overflow:auto;
      flex:1;
      min-height:100px;
      display:flex;
      flex-direction:column;
      gap:9px;
      padding-right:2px;
    }
    .empty{
      background:var(--soft);
      color:var(--muted);
      text-align:center;
      padding:24px 14px;
      border-radius:18px;
      line-height:1.7;
      font-size:14px;
    }
    .cart-item{
      background:var(--soft);
      border-radius:18px;
      padding:10px;
    }
    .cart-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }
    .cart-row strong{font-size:14px}
    .qty{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }
    .qty-control{display:flex;align-items:center;gap:8px}
    .round{
      width:38px;height:38px;border-radius:999px;
      padding:0;
      border:1px solid var(--line);
      background:white;
      font-size:20px;
      line-height:1;
    }
    .qty-num{
      width:26px;
      text-align:center;
      font-size:20px;
      font-weight:900;
    }
    .total-box{
      margin-top:12px;
      background:var(--green2);
      color:white;
      border-radius:22px;
      padding:14px;
    }
    .total-box span{display:block;opacity:.75;font-size:12px}
    .total-box strong{
      display:block;
      font-size:40px;
      letter-spacing:-.08em;
      margin:4px 0 10px;
    }
    .total-box .btn-row{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:8px;
    }
    .total-box .display-btn{
      background:rgba(255,255,255,.2);
      color:white;
      font-size:20px;
      padding:12px 14px;
      border-radius:14px;
    }
    .total-box .checkout-btn{
      width:100%;
      background:white;
      color:var(--green2);
      font-size:17px;
      padding:13px;
      border-radius:14px;
    }

    /* History */
    .history{
      margin-top:12px;
      border-top:1px solid var(--line);
      padding-top:10px;
    }
    .history-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }
    .history-head h3{margin:0;font-size:15px}
    .sale{
      display:flex;
      justify-content:space-between;
      background:var(--soft);
      border-radius:12px;
      padding:8px 10px;
      font-size:13px;
      margin-bottom:6px;
    }

    /* Dialogs */
    dialog{
      width:min(720px,calc(100% - 24px));
      border:0;
      border-radius:26px;
      padding:0;
      box-shadow:0 30px 80px rgba(0,0,0,.25);
      background:white;
    }
    dialog::backdrop{background:rgba(0,0,0,.45)}
    .modal{padding:16px}
    .modal h2{margin:0 0 12px;font-size:21px}
    .formgrid{
      display:grid;
      grid-template-columns:160px 1fr;
      gap:14px;
    }
    .upload{
      aspect-ratio:1/1;
      border:2px dashed #d6d3d1;
      border-radius:22px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:#fafaf9;
      color:var(--muted);
      font-weight:800;
      overflow:hidden;
      text-align:center;
      gap:6px;
      cursor:pointer;
    }
    .upload img{width:100%;height:100%;object-fit:cover}
    .upload-icon{font-size:28px;line-height:1}
    .fields{display:grid;gap:10px}
    label{display:grid;gap:4px;font-size:13px;font-weight:800}
    input,textarea,select{
      width:100%;
      border:1px solid var(--line);
      background:white;
      border-radius:14px;
      padding:11px;
      outline:none;
    }
    textarea{min-height:60px;resize:vertical}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .modal-actions{
      display:flex;
      gap:8px;
      justify-content:flex-end;
      margin-top:14px;
    }
    .hint{color:var(--muted);font-size:12px;line-height:1.6;margin-top:6px}

    /* Customer display dialog */
    #customerDialog{
      width:100%;
      max-width:100%;
      height:100%;
      max-height:100%;
      border-radius:0;
      background:var(--green2);
      color:white;
      margin:0;
    }
    .customer-display{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:32px;
      text-align:center;
    }
    .customer-display .store-name{
      font-size:16px;
      opacity:.7;
      letter-spacing:.15em;
      text-transform:uppercase;
      font-weight:800;
      margin-bottom:16px;
    }
    .customer-display .label{
      font-size:18px;
      opacity:.7;
      margin-bottom:8px;
    }
    .customer-display .total{
      font-size:min(22vw,120px);
      font-weight:900;
      letter-spacing:-.08em;
      line-height:1;
      margin-bottom:32px;
    }
    .customer-display .items-preview{
      background:rgba(255,255,255,.1);
      border-radius:20px;
      padding:16px 24px;
      width:100%;
      max-width:480px;
    }
    .customer-display .item-row{
      display:flex;
      justify-content:space-between;
      padding:6px 0;
      font-size:16px;
      border-bottom:1px solid rgba(255,255,255,.15);
    }
    .customer-display .item-row:last-child{border-bottom:0}
    .close-display{
      position:absolute;
      top:20px;right:20px;
      background:rgba(255,255,255,.15);
      color:white;
      border-radius:999px;
      width:44px;height:44px;
      padding:0;
      font-size:20px;
    }
    .customer-display .thanks{
      margin-top:24px;
      font-size:15px;
      opacity:.6;
    }

    /* Checkout dialog */
    .checkout-summary{
      background:var(--soft);
      border-radius:18px;
      padding:14px;
      margin-bottom:12px;
    }
    .checkout-total{
      font-size:40px;
      font-weight:900;
      letter-spacing:-.06em;
      color:var(--green);
      text-align:center;
      padding:8px 0;
    }
    .checkout-items{
      font-size:13px;
      color:var(--muted);
    }
    .checkout-item-row{
      display:flex;
      justify-content:space-between;
      padding:3px 0;
    }

    /* Notification toast */
    .toast{
      position:fixed;
      bottom:calc(env(safe-area-inset-bottom) + 80px);
      left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--green2);
      color:white;
      padding:11px 20px;
      border-radius:999px;
      font-size:14px;
      font-weight:800;
      opacity:0;
      transition:opacity .2s,transform .2s;
      pointer-events:none;
      white-space:nowrap;
      z-index:99;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Barcode input overlay */
    .barcode-manual{
      background:white;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
    }
    .barcode-manual label{font-size:14px;font-weight:800;margin-bottom:8px;display:block}

    @media(max-width:920px){
      .wrap{grid-template-columns:1fr}
      .cart{
        position:fixed;
        left:10px;right:10px;bottom:10px;top:auto;
        max-height:50vh;
        z-index:9;
        border:1px solid var(--line);
      }
      .main,.scan-wrap,.report-wrap{padding-bottom:320px}
      .grid{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:560px){
      header{padding:10px 10px 0}
      .brand h1{font-size:20px}
      .tab{padding:9px 12px;font-size:13px}
      .wrap{padding:10px}
      .stats{grid-template-columns:1fr 1fr}
      .stats .stat:nth-child(3){grid-column:1/-1}
      .grid{grid-template-columns:1fr 1fr}
      .product-actions{grid-template-columns:1fr 52px 44px}
      .formgrid{grid-template-columns:1fr}
      .two{grid-template-columns:1fr}
      .report-summary{grid-template-columns:1fr 1fr}
      .report-summary .report-card:last-child{grid-column:1/-1}
    }
    @media print{
      header,.main,.scan-wrap,.report-wrap,.history,dialog{display:none!important}
      .cart{position:static;box-shadow:none}
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="brand">
        <small>Wazuka Tea POS</small>
        <h1>茶レジ Pro</h1>
      </div>
      <button class="btn-primary" id="newProductBtn">＋ 商品登録</button>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="products">商品一覧</button>
      <button class="tab" data-tab="scan">📷 スキャン</button>
      <button class="tab" data-tab="report">📊 レポート</button>
    </nav>
  </header>

  <div class="wrap">
    <main>
      <!-- 商品一覧 -->
      <div class="panel active" id="panel-products">
        <section class="stats">
          <div class="stat"><span>登録商品</span><strong id="productCount">0</strong></div>
          <div class="stat"><span>今日の売上</span><strong id="todayTotal">¥0</strong></div>
          <div class="stat"><span>カート点数</span><strong id="itemCount">0</strong></div>
        </section>
        <div class="search">
          <input id="searchInput" placeholder="商品名・カテゴリーで検索" />
        </div>
        <section class="grid" id="productGrid"></section>
      </div>

      <!-- スキャン -->
      <div class="panel" id="panel-scan">
        <div class="scan-wrap">
          <div class="camera-box">
            <video id="scanVideo" autoplay playsinline muted></video>
            <div class="scan-overlay">
              <div class="scan-frame"></div>
            </div>
            <div class="scan-detected" id="scanDetected"></div>
            <div class="scan-hint" id="scanHint">バーコードをフレームに合わせてください</div>
          </div>

          <div class="scan-controls">
            <button class="btn-primary" id="startCameraBtn">📷 カメラ起動</button>
            <button class="btn-light" id="stopCameraBtn" style="display:none">停止</button>
            <button class="btn-light" id="captureBtn" style="display:none">📸 撮影して検索</button>
            <button class="btn-light" id="switchCameraBtn" style="display:none">🔄 カメラ切替</button>
          </div>

          <div class="barcode-manual">
            <label for="barcodeInput">バーコード番号を手入力</label>
            <div style="display:flex;gap:8px">
              <input id="barcodeInput" placeholder="例：4901234567890" inputmode="numeric" style="flex:1">
              <button class="btn-primary" id="barcodeSearchBtn">検索</button>
            </div>
          </div>

          <div id="scanResults" class="scan-result-list"></div>

          <!-- Capture canvas (hidden) -->
          <canvas id="captureCanvas" style="display:none"></canvas>
        </div>
      </div>

      <!-- レポート -->
      <div class="panel" id="panel-report">
        <div class="report-wrap">
          <div class="report-header">
            <h2>販売レポート</h2>
            <div class="date-range">
              <label>From <input type="date" id="dateFrom"></label>
              <label>To <input type="date" id="dateTo"></label>
              <button class="btn-light" id="todayBtn">今日</button>
              <button class="btn-light" id="allBtn">全期間</button>
            </div>
          </div>

          <div class="report-summary">
            <div class="report-card">
              <span>総売上</span>
              <strong id="rptTotal">¥0</strong>
            </div>
            <div class="report-card">
              <span>会計件数</span>
              <strong id="rptCount">0</strong>
            </div>
            <div class="report-card">
              <span>販売点数</span>
              <strong id="rptItems">0</strong>
            </div>
          </div>

          <table id="productTable">
            <thead>
              <tr>
                <th>#</th>
                <th>商品名</th>
                <th><button class="sort-btn" data-col="qty">数量 ↕</button></th>
                <th><button class="sort-btn" data-col="revenue">売上 ↕</button></th>
                <th>構成比</th>
              </tr>
            </thead>
            <tbody id="reportBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Cart -->
    <aside class="cart">
      <div class="cart-head">
        <h2>お会計</h2>
        <button class="btn-light" id="resetCartBtn">リセット</button>
      </div>

      <div class="cart-list" id="cartList"></div>

      <div class="total-box">
        <span>合計販売金額</span>
        <strong id="cartTotal">¥0</strong>
        <div class="btn-row">
          <button class="display-btn" id="displayBtn" title="顧客表示">👁️</button>
          <button class="checkout-btn" id="checkoutBtn" disabled>会計完了</button>
        </div>
      </div>

      <section class="history">
        <div class="history-head">
          <h3>売上履歴</h3>
          <button class="btn-light" id="csvBtn">CSV</button>
        </div>
        <div id="salesList"></div>
      </section>
    </aside>
  </div>

  <!-- Product form dialog -->
  <dialog id="productDialog">
    <form method="dialog" class="modal" id="productForm">
      <h2 id="dialogTitle">商品登録</h2>
      <div class="formgrid">
        <div>
          <button type="button" class="upload" id="uploadBtn">
            <span class="upload-icon" id="uploadIcon">📷</span>
            <span id="uploadText" style="font-size:12px">写真を撮影<br>または選択</span>
            <img id="preview" alt="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:22px">
          </button>
          <input id="imageInput" type="file" accept="image/*" capture="environment" hidden>
        </div>

        <div class="fields">
          <div class="two">
            <label>商品名
              <input id="nameInput" required placeholder="例：特上ほうじ茶TB">
            </label>
            <label>税込価格
              <input id="priceInput" required inputmode="numeric" placeholder="例：540">
            </label>
          </div>
          <div class="two">
            <label>カテゴリー
              <input id="categoryInput" placeholder="例：ほうじ茶">
            </label>
            <label>バーコード
              <input id="barcodeProductInput" placeholder="例：4901234567890" inputmode="numeric">
            </label>
          </div>
          <label>メモ
            <input id="memoInput" placeholder="例：上香園 / 15袋入り">
          </label>
          <p class="hint">商品データと売上はこのブラウザ内に保存されます。</p>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-light" id="cancelBtn">キャンセル</button>
        <button type="submit" class="btn-primary">保存</button>
      </div>
    </form>
  </dialog>

  <!-- Customer display dialog -->
  <dialog id="customerDialog">
    <div class="customer-display">
      <button class="close-display" id="closeDisplayBtn">✕</button>
      <div class="store-name">Wazuka Tea</div>
      <div class="label">合計金額</div>
      <div class="total" id="displayTotal">¥0</div>
      <div class="items-preview" id="displayItems"></div>
      <div class="thanks">ありがとうございます</div>
    </div>
  </dialog>

  <!-- Checkout confirm dialog -->
  <dialog id="checkoutDialog">
    <div class="modal">
      <h2>会計完了</h2>
      <div class="checkout-summary">
        <div class="checkout-total" id="checkoutTotal"></div>
        <div class="checkout-items" id="checkoutItems"></div>
      </div>
      <p style="font-size:14px;color:var(--muted)">会計を完了してカートをリセットしますか？</p>
      <div class="modal-actions">
        <button class="btn-light" id="checkoutCancelBtn">キャンセル</button>
        <button class="btn-primary" id="checkoutConfirmBtn">完了する</button>
      </div>
    </div>
  </dialog>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "cha-regi-pro-products-v1";
    const SALES_KEY = "cha-regi-pro-sales-v1";

    const sampleProducts = [
      { id: uid(), name: "特上ほうじ茶TB", price: 540, category: "ほうじ茶", memo: "上香園 / ティーバッグ", barcode: "", image: "" },
      { id: uid(), name: "ほうじ玄米茶", price: 540, category: "玄米茶", memo: "ティーバッグ", barcode: "", image: "" },
      { id: uid(), name: "ほうじ茶ティーバッグ", price: 540, category: "ほうじ茶", memo: "15袋入り", barcode: "", image: "" },
      { id: uid(), name: "缶入りほうじ茶", price: 2300, category: "缶入り", memo: "税込価格シール ¥2300", barcode: "", image: "" }
    ];

    let products = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") || sampleProducts;
    let sales = JSON.parse(localStorage.getItem(SALES_KEY) || "[]");
    let cart = {};
    let editingId = null;
    let currentImage = "";
    let stream = null;
    let barcodeDetector = null;
    let scanLoop = null;
    let facingMode = "environment";
    let sortCol = "revenue";
    let sortDir = -1;

    const $ = s => document.querySelector(s);
    const productGrid = $("#productGrid");
    const cartList = $("#cartList");
    const salesList = $("#salesList");
    const productDialog = $("#productDialog");
    const customerDialog = $("#customerDialog");
    const checkoutDialog = $("#checkoutDialog");

    function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
    function yen(n){ return new Intl.NumberFormat("ja-JP",{style:"currency",currency:"JPY",maximumFractionDigits:0}).format(Number(n||0)); }
    function esc(str){ return String(str??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }

    function save(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
      localStorage.setItem(SALES_KEY, JSON.stringify(sales));
    }

    function priceNum(v){
      const z = String(v||"").replace(/[０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xfee0)).replace(/[^0-9]/g,"");
      return z ? Number(z) : 0;
    }

    function toast(msg, ms=2000){
      const el = $("#toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(()=>el.classList.remove("show"), ms);
    }

    /* ─── Cart helpers ─── */
    function cartItems(){
      return Object.entries(cart).map(([pid,qty])=>{
        const p = products.find(x=>x.id===pid);
        return p ? {...p, qty, subtotal:p.price*qty} : null;
      }).filter(Boolean);
    }
    function cartTotal(){ return cartItems().reduce((s,i)=>s+i.subtotal,0); }
    function todaySalesTotal(){
      const t = new Date().toISOString().slice(0,10);
      return sales.filter(s=>s.date.slice(0,10)===t).reduce((sum,s)=>sum+s.total,0);
    }

    /* ─── Render ─── */
    function render(){
      const q = $("#searchInput").value.trim().toLowerCase();
      const filtered = products.filter(p=>(`${p.name} ${p.category} ${p.memo}`).toLowerCase().includes(q));

      $("#productCount").textContent = products.length;
      $("#todayTotal").textContent = yen(todaySalesTotal());
      $("#itemCount").textContent = Object.values(cart).reduce((a,b)=>a+b,0);

      productGrid.innerHTML = filtered.map(p=>`
        <article class="product">
          <div onclick="addToCart('${p.id}')" class="photo">
            ${p.image ? `<img src="${p.image}" alt="${esc(p.name)}">` : "商品写真"}
          </div>
          <div class="product-body" onclick="addToCart('${p.id}')">
            <h2>${esc(p.name)}</h2>
            <div class="meta">${esc(p.category||"未分類")}</div>
            ${p.memo ? `<div class="meta">${esc(p.memo)}</div>` : ""}
            <div class="price">${yen(p.price)}</div>
          </div>
          <div class="product-actions">
            <button class="btn-primary" onclick="addToCart('${p.id}')">＋追加</button>
            <button class="btn-light" onclick="editProduct('${p.id}')">編集</button>
            <button class="btn-danger" onclick="deleteProduct('${p.id}')">削除</button>
          </div>
        </article>
      `).join("");

      const items = cartItems();
      if(!items.length){
        cartList.innerHTML = `<div class="empty">商品をタップすると<br>ここに追加されます</div>`;
      } else {
        cartList.innerHTML = items.map(item=>`
          <div class="cart-item">
            <div class="cart-row">
              <div>
                <strong>${esc(item.name)}</strong>
                <div class="meta">${yen(item.price)} × ${item.qty}</div>
              </div>
              <strong>${yen(item.subtotal)}</strong>
            </div>
            <div class="qty">
              <div class="qty-control">
                <button class="round" onclick="changeQty('${item.id}',-1)">−</button>
                <div class="qty-num">${item.qty}</div>
                <button class="round" onclick="changeQty('${item.id}',1)">＋</button>
              </div>
              <button class="btn-ghost" onclick="removeCart('${item.id}')">削除</button>
            </div>
          </div>
        `).join("");
      }

      const total = cartTotal();
      $("#cartTotal").textContent = yen(total);
      $("#checkoutBtn").disabled = !items.length;

      salesList.innerHTML = sales.slice(0,8).map(s=>`
        <div class="sale">
          <span>${new Date(s.date).toLocaleString("ja-JP",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})}</span>
          <strong>${yen(s.total)}</strong>
        </div>
      `).join("") || `<div class="meta" style="font-size:13px;padding:6px 0">会計完了後に履歴が残ります。</div>`;

      save();
    }

    /* ─── Product actions ─── */
    window.addToCart = function(pid){
      cart[pid] = (cart[pid]||0)+1;
      const p = products.find(x=>x.id===pid);
      if(p) toast(`${p.name} を追加しました`);
      render();
    };
    window.changeQty = function(pid,delta){
      cart[pid] = (cart[pid]||0)+delta;
      if(cart[pid]<=0) delete cart[pid];
      render();
    };
    window.removeCart = function(pid){
      delete cart[pid];
      render();
    };
    window.editProduct = function(pid){
      const p = products.find(x=>x.id===pid);
      if(!p) return;
      editingId = pid;
      currentImage = p.image||"";
      $("#dialogTitle").textContent = "商品編集";
      $("#nameInput").value = p.name;
      $("#priceInput").value = p.price;
      $("#categoryInput").value = p.category||"";
      $("#memoInput").value = p.memo||"";
      $("#barcodeProductInput").value = p.barcode||"";
      setPreview(currentImage);
      productDialog.showModal();
    };
    window.deleteProduct = function(pid){
      if(!confirm("この商品を削除しますか？")) return;
      products = products.filter(p=>p.id!==pid);
      delete cart[pid];
      render();
    };

    /* ─── Product form ─── */
    function openNew(){
      editingId = null;
      currentImage = "";
      $("#dialogTitle").textContent = "商品登録";
      $("#productForm").reset();
      setPreview("");
      productDialog.showModal();
    }
    function setPreview(src){
      const img = $("#preview"), text = $("#uploadText"), icon = $("#uploadIcon");
      if(src){
        img.src = src;
        img.style.display = "block";
        text.style.display = "none";
        icon.style.display = "none";
      } else {
        img.src = "";
        img.style.display = "none";
        text.style.display = "block";
        icon.style.display = "block";
      }
    }

    $("#newProductBtn").addEventListener("click", openNew);
    $("#cancelBtn").addEventListener("click", ()=>productDialog.close());
    $("#uploadBtn").addEventListener("click", ()=>$("#imageInput").click());
    $("#searchInput").addEventListener("input", render);
    $("#resetCartBtn").addEventListener("click", ()=>{ cart={}; render(); });

    $("#imageInput").addEventListener("change", e=>{
      const file = e.target.files?.[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{ currentImage = reader.result; setPreview(currentImage); };
      reader.readAsDataURL(file);
    });

    $("#productForm").addEventListener("submit", e=>{
      e.preventDefault();
      const name = $("#nameInput").value.trim();
      const price = priceNum($("#priceInput").value);
      if(!name || !price){ alert("商品名と税込価格を入力してください。"); return; }
      const payload = {
        id: editingId||uid(),
        name, price,
        category: $("#categoryInput").value.trim(),
        memo: $("#memoInput").value.trim(),
        barcode: $("#barcodeProductInput").value.trim(),
        image: currentImage
      };
      if(editingId){
        products = products.map(p=>p.id===editingId ? payload : p);
        toast("商品を更新しました");
      } else {
        products.unshift(payload);
        toast("商品を登録しました");
      }
      productDialog.close();
      render();
    });

    /* ─── Checkout ─── */
    $("#checkoutBtn").addEventListener("click", ()=>{
      const items = cartItems();
      if(!items.length) return;
      const total = cartTotal();
      $("#checkoutTotal").textContent = yen(total);
      $("#checkoutItems").innerHTML = items.map(i=>`
        <div class="checkout-item-row">
          <span>${esc(i.name)} × ${i.qty}</span>
          <span>${yen(i.subtotal)}</span>
        </div>
      `).join("");
      checkoutDialog.showModal();
    });
    $("#checkoutCancelBtn").addEventListener("click", ()=>checkoutDialog.close());
    $("#checkoutConfirmBtn").addEventListener("click", ()=>{
      const items = cartItems();
      if(!items.length) return;
      const total = cartTotal();
      sales.unshift({
        id:uid(),
        date:new Date().toISOString(),
        total,
        items:items.map(i=>({id:i.id,name:i.name,price:i.price,qty:i.qty,subtotal:i.subtotal}))
      });
      cart = {};
      checkoutDialog.close();
      render();
      toast("会計完了しました ✓", 3000);
    });

    /* ─── Customer display ─── */
    $("#displayBtn").addEventListener("click", ()=>{
      const items = cartItems();
      const total = cartTotal();
      $("#displayTotal").textContent = yen(total);
      $("#displayItems").innerHTML = items.map(i=>`
        <div class="item-row">
          <span>${esc(i.name)} × ${i.qty}</span>
          <span>${yen(i.subtotal)}</span>
        </div>
      `).join("") || `<div style="text-align:center;opacity:.7;font-size:15px">商品を追加してください</div>`;
      customerDialog.showModal();
      // Try fullscreen
      customerDialog.requestFullscreen?.().catch(()=>{});
    });
    $("#closeDisplayBtn").addEventListener("click", ()=>{
      if(document.fullscreenElement) document.exitFullscreen?.();
      customerDialog.close();
    });

    /* ─── Tabs ─── */
    document.querySelectorAll(".tab").forEach(tab=>{
      tab.addEventListener("click", ()=>{
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
        tab.classList.add("active");
        const id = "panel-"+tab.dataset.tab;
        document.getElementById(id)?.classList.add("active");
        if(tab.dataset.tab==="report") renderReport();
        if(tab.dataset.tab!=="scan") stopCamera();
      });
    });

    /* ─── Camera / Scanner ─── */
    async function startCamera(){
      if(stream) stopCamera();
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video:{ facingMode, width:{ideal:1280}, height:{ideal:720} }
        });
        const video = $("#scanVideo");
        video.srcObject = stream;
        await video.play();
        $("#startCameraBtn").style.display = "none";
        $("#stopCameraBtn").style.display = "";
        $("#captureBtn").style.display = "";
        $("#switchCameraBtn").style.display = "";
        $("#scanHint").textContent = "バーコードをフレームに合わせてください";

        // Try BarcodeDetector
        if("BarcodeDetector" in window){
          barcodeDetector = new BarcodeDetector({formats:["ean_13","ean_8","code_128","qr_code","data_matrix"]});
          startScanLoop();
        } else {
          $("#scanHint").textContent = "📸 撮影ボタンで画像検索できます";
        }
      } catch(err){
        alert("カメラを起動できませんでした。\n" + err.message);
      }
    }

    function stopCamera(){
      if(scanLoop){ clearInterval(scanLoop); scanLoop=null; }
      if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
      const video = $("#scanVideo");
      video.srcObject = null;
      $("#startCameraBtn").style.display = "";
      $("#stopCameraBtn").style.display = "none";
      $("#captureBtn").style.display = "none";
      $("#switchCameraBtn").style.display = "none";
      $("#scanDetected").style.display = "none";
    }

    function startScanLoop(){
      scanLoop = setInterval(async ()=>{
        if(!barcodeDetector || !stream) return;
        const video = $("#scanVideo");
        if(video.readyState < 2) return;
        try {
          const codes = await barcodeDetector.detect(video);
          if(codes.length){
            const code = codes[0].rawValue;
            handleBarcode(code);
          }
        } catch(e){}
      }, 500);
    }

    async function switchCamera(){
      facingMode = facingMode==="environment" ? "user" : "environment";
      if(stream) await startCamera();
    }

    function captureFrame(){
      const video = $("#scanVideo");
      const canvas = $("#captureCanvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
      showImageSearchResults(dataUrl);
    }

    // Image-based search: show all products for manual selection
    function showImageSearchResults(dataUrl){
      const detected = $("#scanDetected");
      detected.textContent = "📸 撮影完了 — 商品を選択してください";
      detected.style.display = "block";
      setTimeout(()=>{ detected.style.display="none"; }, 3000);

      // Show all products as selectable matches
      const resultsEl = $("#scanResults");
      if(!products.length){
        resultsEl.innerHTML = `<div class="empty">商品が登録されていません</div>`;
        return;
      }
      resultsEl.innerHTML = `
        <div style="font-weight:800;font-size:14px;margin-bottom:4px;color:var(--muted)">商品を選択してカートに追加</div>
        ${products.map(p=>`
          <div class="scan-match" onclick="addToCart('${p.id}');clearScanResults()">
            <div class="scan-match-photo">
              ${p.image ? `<img src="${p.image}" alt="${esc(p.name)}">` : "📦"}
            </div>
            <div class="scan-match-info">
              <h3>${esc(p.name)}</h3>
              <div class="meta">${esc(p.category||"未分類")} ${p.memo?'— '+esc(p.memo):''}</div>
              <div style="color:var(--green);font-weight:900;font-size:16px">${yen(p.price)}</div>
            </div>
            <div class="scan-match-add">＋追加</div>
          </div>
        `).join("")}
      `;
    }

    function handleBarcode(code){
      // Try to find by barcode field
      const match = products.find(p=>p.barcode && p.barcode===code);
      const detected = $("#scanDetected");
      if(match){
        detected.textContent = `✓ ${match.name} — ${yen(match.price)}`;
        detected.style.display = "block";
        addToCart(match.id);
        setTimeout(()=>{ detected.style.display="none"; }, 2000);
        clearScanResults();
      } else {
        detected.textContent = `バーコード: ${code} — 商品が見つかりません`;
        detected.style.display = "block";
        setTimeout(()=>{ detected.style.display="none"; }, 3000);
        showBarcodeNoMatch(code);
      }
    }

    function showBarcodeNoMatch(code){
      const resultsEl = $("#scanResults");
      resultsEl.innerHTML = `
        <div style="background:white;border-radius:18px;padding:14px;box-shadow:var(--shadow)">
          <div style="font-weight:800;margin-bottom:8px">バーコード: ${esc(code)}</div>
          <div style="color:var(--muted);font-size:13px;margin-bottom:12px">このバーコードに登録された商品がありません。</div>
          <button class="btn-primary" onclick="openNewWithBarcode('${esc(code)}')">＋ この商品を登録する</button>
        </div>
        <div style="font-weight:800;font-size:14px;margin:8px 0 4px;color:var(--muted)">または既存商品を選択</div>
        ${products.map(p=>`
          <div class="scan-match" onclick="addToCart('${p.id}');clearScanResults()">
            <div class="scan-match-photo">
              ${p.image ? `<img src="${p.image}" alt="${esc(p.name)}">` : "📦"}
            </div>
            <div class="scan-match-info">
              <h3>${esc(p.name)}</h3>
              <div class="meta">${esc(p.category||"")}</div>
              <div style="color:var(--green);font-weight:900;font-size:16px">${yen(p.price)}</div>
            </div>
            <div class="scan-match-add">＋追加</div>
          </div>
        `).join("")}
      `;
    }

    window.openNewWithBarcode = function(code){
      editingId = null;
      currentImage = "";
      $("#dialogTitle").textContent = "商品登録";
      $("#productForm").reset();
      $("#barcodeProductInput").value = code;
      setPreview("");
      productDialog.showModal();
    };
    window.clearScanResults = function(){
      $("#scanResults").innerHTML = "";
    };

    $("#startCameraBtn").addEventListener("click", startCamera);
    $("#stopCameraBtn").addEventListener("click", stopCamera);
    $("#captureBtn").addEventListener("click", captureFrame);
    $("#switchCameraBtn").addEventListener("click", switchCamera);

    $("#barcodeSearchBtn").addEventListener("click", ()=>{
      const code = $("#barcodeInput").value.trim();
      if(!code){ alert("バーコード番号を入力してください"); return; }
      handleBarcode(code);
      $("#barcodeInput").value = "";
    });
    $("#barcodeInput").addEventListener("keydown", e=>{
      if(e.key==="Enter"){ $("#barcodeSearchBtn").click(); }
    });

    /* ─── Report ─── */
    function today8(){ return new Date().toISOString().slice(0,10); }

    function initDateRange(){
      const today = today8();
      $("#dateFrom").value = today;
      $("#dateTo").value = today;
    }
    initDateRange();

    $("#todayBtn").addEventListener("click", ()=>{
      const t = today8();
      $("#dateFrom").value = t;
      $("#dateTo").value = t;
      renderReport();
    });
    $("#allBtn").addEventListener("click", ()=>{
      if(!sales.length){ renderReport(); return; }
      const dates = sales.map(s=>s.date.slice(0,10)).sort();
      $("#dateFrom").value = dates[0];
      $("#dateTo").value = dates[dates.length-1];
      renderReport();
    });
    $("#dateFrom").addEventListener("change", renderReport);
    $("#dateTo").addEventListener("change", renderReport);

    document.querySelectorAll(".sort-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const col = btn.dataset.col;
        if(sortCol===col) sortDir *= -1;
        else { sortCol=col; sortDir=-1; }
        renderReport();
      });
    });

    function renderReport(){
      const from = $("#dateFrom").value;
      const to = $("#dateTo").value;

      const filtered = sales.filter(s=>{
        const d = s.date.slice(0,10);
        return (!from || d>=from) && (!to || d<=to);
      });

      const totalRev = filtered.reduce((s,x)=>s+x.total, 0);
      const totalQty = filtered.reduce((s,x)=>s+x.items.reduce((a,b)=>a+b.qty,0), 0);
      $("#rptTotal").textContent = yen(totalRev);
      $("#rptCount").textContent = filtered.length;
      $("#rptItems").textContent = totalQty;

      // Aggregate per product
      const byProduct = {};
      filtered.forEach(sale=>{
        sale.items.forEach(item=>{
          if(!byProduct[item.id]){
            byProduct[item.id] = { id:item.id, name:item.name, price:item.price, qty:0, revenue:0 };
          }
          byProduct[item.id].qty += item.qty;
          byProduct[item.id].revenue += item.subtotal;
        });
      });

      // Also include products that may have been sold but name changed — use latest name from products list
      const rows = Object.values(byProduct).map(r=>{
        const p = products.find(x=>x.id===r.id);
        return { ...r, name: p ? p.name : r.name };
      });

      rows.sort((a,b)=>(a[sortCol]-b[sortCol])*sortDir);

      const maxRev = rows.reduce((m,r)=>Math.max(m,r.revenue),1);

      $("#reportBody").innerHTML = rows.length ? rows.map((r,i)=>`
        <tr>
          <td><span class="rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</span></td>
          <td><strong>${esc(r.name)}</strong></td>
          <td>${r.qty}<span style="color:var(--muted);font-size:12px"> 点</span></td>
          <td><strong>${yen(r.revenue)}</strong></td>
          <td>
            <div class="bar-wrap">
              <div class="bar" style="width:${Math.round(r.revenue/maxRev*100)}px"></div>
              <span style="font-size:12px;color:var(--muted)">${totalRev ? Math.round(r.revenue/totalRev*100) : 0}%</span>
            </div>
          </td>
        </tr>
      `).join("") : `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">この期間の売上データがありません</td></tr>`;
    }

    /* ─── CSV export ─── */
    $("#csvBtn").addEventListener("click", ()=>{
      const rows = [["日時","商品名","単価","数量","小計","会計合計"]];
      sales.forEach(s=>{
        s.items.forEach(i=>rows.push([
          new Date(s.date).toLocaleString("ja-JP"),
          i.name, i.price, i.qty, i.subtotal, s.total
        ]));
      });
      const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
      const blob = new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href=url; a.download=`cha-regi-sales-${today8()}.csv`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    });

    render();
  </script>
</body>
</html>
