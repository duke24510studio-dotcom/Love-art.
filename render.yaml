# Render Blueprint — https://render.com/deploy?repo=https://github.com/duke24510studio-dotcom/Love-art.
databases:
  - name: japandi-db
    plan: free
    databaseName: japandi
    user: japandi

services:
  - type: web
    name: japandi-poster-studio
    runtime: node
    plan: free
    region: singapore
    repo: https://github.com/duke24510studio-dotcom/Love-art.
    branch: main
    # Migrations must run at start time: Render's build environment has no
    # network access to the private database, so `prisma migrate deploy`
    # always fails with P1001 when placed in buildCommand.
    # --include=dev: NODE_ENV=production makes npm omit devDependencies,
    # but the build needs tailwind/postcss/typescript from devDependencies.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: japandi-db
          property: connectionString
      - key: OUTPUT_DIR
        value: ./outputs
      - key: OPENAI_API_KEY
        sync: false
