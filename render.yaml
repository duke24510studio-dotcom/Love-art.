# Render Blueprint — https://render.com/deploy?repo=https://github.com/duke24510studio-dotcom/Love-art.
databases:
  - name: japandi-db
    plan: free
    databaseName: japandi
    user: japandi

services:
  - type: web
    name: japandi-poster-studio
    runtime: node
    plan: free
    region: singapore
    repo: https://github.com/duke24510studio-dotcom/Love-art.
    branch: main
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: japandi-db
          property: connectionString
      - key: OUTPUT_DIR
        value: ./outputs
      - key: OPENAI_API_KEY
        sync: false
