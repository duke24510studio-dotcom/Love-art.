name: YouTube Stats Refresh

# Snapshots stats for tracked YouTube videos every 6 hours so that
# day-over-day view growth can be computed (see docs/YOUTUBE_RESEARCH.md).
#
# Required repository secrets:
#   APP_URL      e.g. https://japandi-poster-studio.onrender.com (no trailing slash)
#   CRON_SECRET  same value as the CRON_SECRET env var on the server

on:
  schedule:
    - cron: "30 */6 * * *" # every 6 hours (UTC)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL / CRON_SECRET secrets are not set; skipping."
            exit 0
          fi
          echo "POST ${APP_URL}/api/cron/youtube"
          curl --fail-with-body -sS -X POST "${APP_URL}/api/cron/youtube" \
            -H "Authorization: Bearer ${CRON_SECRET}"
