name: Article Pipeline

# Hits the deployed app's research+draft pipeline once a day.
# Default: 4 original Japanese drafts for note (direction en2ja).
# Drafts only — publishing stays human-reviewed (see docs/ARTICLE_PIPELINE.md).
#
# Required repository secrets:
#   APP_URL      e.g. https://japandi-poster-studio.onrender.com (no trailing slash)
#   CRON_SECRET  same value as the CRON_SECRET env var on the server

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC (09:00 JST)
  workflow_dispatch:
    inputs:
      direction:
        description: "en2ja (note), ja2en (Medium), or empty for both"
        required: false
        default: "en2ja"
      count:
        description: "drafts per direction (1-5)"
        required: false
        default: "4"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Scheduled runs have no inputs, so fall back to the note-only default.
          DIRECTION: ${{ inputs.direction || 'en2ja' }}
          COUNT: ${{ inputs.count || '4' }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL / CRON_SECRET secrets are not set; skipping."
            exit 0
          fi
          body="{\"count\": ${COUNT}"
          if [ -n "$DIRECTION" ]; then
            body="${body}, \"direction\": \"${DIRECTION}\""
          fi
          body="${body}}"
          echo "POST ${APP_URL}/api/cron/pipeline ${body}"
          curl --fail-with-body -sS -X POST "${APP_URL}/api/cron/pipeline" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "${body}"
