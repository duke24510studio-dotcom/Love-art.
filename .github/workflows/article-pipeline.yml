name: Article Pipeline

# Hits the deployed app's research+draft pipeline once a day.
# Default: 1 original Japanese draft for EACH note brand =>
#   en2ja     -> ランタンノート (global trends x Zen life-coach)
#   stillflow -> still flow / 円相 (Zen x Western philosophy essays)
# ~7 drafts per brand per week, matching the weekly-review + note
# scheduled-publishing workflow. Drafts only — publishing stays
# human-reviewed (see docs/ARTICLE_PIPELINE.md).
#
# Required repository secrets:
#   APP_URL      e.g. https://japandi-poster-studio.onrender.com (no trailing slash)
#   CRON_SECRET  same value as the CRON_SECRET env var on the server

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC (09:00 JST)
  workflow_dispatch:
    inputs:
      direction:
        description: "en2ja, stillflow, ja2en — or empty for both note brands"
        required: false
        default: ""
      count:
        description: "drafts per direction (1-5)"
        required: false
        default: "1"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Empty (scheduled runs, or blank manual input) => both note brands.
          DIRECTION: ${{ inputs.direction }}
          COUNT: ${{ inputs.count || '1' }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL / CRON_SECRET secrets are not set; skipping."
            exit 0
          fi

          if [ -n "$DIRECTION" ]; then
            directions="$DIRECTION"
          else
            directions="en2ja stillflow"
          fi

          status=0
          for dir in $directions; do
            body="{\"count\": ${COUNT}, \"direction\": \"${dir}\"}"
            echo "POST ${APP_URL}/api/cron/pipeline ${body}"
            curl --fail-with-body -sS -X POST "${APP_URL}/api/cron/pipeline" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              -d "${body}" || status=1
            echo
          done
          exit $status
